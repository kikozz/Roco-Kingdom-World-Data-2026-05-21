package Next;

import "com_pet.proto";

message PetSkillEquipInfo {
  uint32 id = 1;
  uint32 pos = 2;
}

message PetTeam_PetInfo {
  uint32 pet_gid = 1;
  repeated Next.PetSkillEquipInfo equip_infos = 2;
  bool is_trial_pet = 3;
  Next.PetTypeInfo type = 4;
}

message PetTeam {
  repeated Next.PetTeam_PetInfo pet_infos = 2;
  string team_name = 3;
  uint32 role_magic_gid = 4;
  Next.TrialPetBrief trial_pet = 5;
  bool is_mirror = 6;
  string mirror_friend_name = 7;
  uint32 team_idx = 8;
  uint32 mirror_friend_uin = 9;
  uint32 mirror_friend_card_icon_selected = 10;
  uint32 mirror_magic_id = 11;
}

message PetSynchronInfo {
  uint32 type = 1;
  uint32 number = 2;
}

message PetTeamInfo {
  uint32 main_team_idx = 1;
  repeated Next.PetTeam teams = 2;
  repeated Next.PetSynchronInfo synchron = 3;
  uint32 team_type = 4;
}

message SharedPetTeamInfo {
  string team_name = 1;
  uint32 team_type = 2;
  uint32 role_magic_id = 3;
  repeated Next.SharedPetInfo pets = 4;
}

message SharedPetInfo {
  int32 hp_talent = 1;
  int32 attack_talent = 2;
  int32 special_attack_talent = 3;
  int32 defense_talent = 4;
  int32 special_defense_talent = 5;
  int32 speed_talent = 6;
  uint32 base_conf_id = 7;
  uint32 nature = 8;
  uint32 blood_id = 9;
  repeated Next.PetSkillEquipInfo skills = 10;
  uint32 changed_nature_pos_attr_type = 11;
  uint32 changed_nature_neg_attr_type = 12;
}

message AdjustedPetTeamInfo {
  repeated Next.AdjustedPet pets = 1;
}

message AdjustedPet {
  uint32 gid = 1;
  repeated Next.AdjustedPetSkill skills = 2;
}

message AdjustedPetSkill {
  uint32 id = 1;
  uint32 pos = 2;
  repeated uint32 alternative_skills = 3;
}

message RecommendPetTeamInfo {
  Next.SharedPetTeamInfo pet_team_info = 1;
  string pet_team_share_id = 2;
  string player_name = 3;
  string player_headpic = 4;
  uint32 pet_level = 5;
  string team_name = 6;
  uint32 team_id = 7;
}

message FriendPetTeamInfo {
  repeated Next.PetData pets = 1;
  repeated Next.PetTeam teams = 2;
  string friend_name = 3;
  uint32 friend_uin = 4;
  uint32 friend_level = 5;
  uint32 friend_card_icon_selected = 6;
  bool friend_is_mirror_unlocked = 7;
}

message FriendPetTeamIndex {
  string index_string = 1;
}

message FriendPetTeamBufferFriendInfo {
  bytes name = 1;
  uint32 level = 2;
  uint32 card_icon_selected = 3;
}
