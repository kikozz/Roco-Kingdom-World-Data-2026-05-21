  MST_TYPE_SYSTEM = 1;
  MST_TYPE_MESSAGE = 2;
  MST_TYPE_FRIEND_INVITE = 3;
  MST_TYPE_FRIEND_INVITERSP = 4;
  MST_TYPE_FRIEND_SEND = 5;
  MST_TYPE_ASKFOR = 6;
  MST_TYPE_FRIEND_SEND_COIN = 7;
  MST_TYPE_IDIP_ADD = 8;
  MST_TYPE_IDIP_SUB = 9;
  MST_TYPE_IDIP_CHAT_BAN = 10;
  MST_TYPE_IDIP_CHAT_LIFT = 11;
  MST_TYPE_CREDIT_PT_ADD = 12;
  MST_TYPE_CREDIT_PT_DEC = 13;
  MST_TYPE_CREDIT_REPORT_RT = 14;
  MST_TYPE_CREDIT_SUSPEND_ST = 15;
  MST_TYPE_CREDIT_LIKE = 16;
  MST_TYPE_IDIP_GAME_BAN = 17;
  MST_TYPE_IDIP_GAME_LIFT = 18;
  MST_TYPE_RANK_EXPIRE = 19;
  MST_TYPE_IDIP_ELO_ADD = 20;
  MST_TYPE_IDIP_ELO_SUB = 21;
  MST_TYPE_IDIP_BAN_RANKLIST = 22;
  MST_TYPE_IDIP_PLATINFO_NAME = 23;
  MST_TYPE_IDIP_PLATINFO_ICON = 24;
  MST_TYPE_GAME_RANKING = 25;
