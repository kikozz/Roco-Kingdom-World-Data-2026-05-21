enum MailStatusType {
  MAIL_STATUS_UNREAD = 0;
  MAIL_STATUS_READ = 1;
}

enum MailRecvStatusType {
  MAIL_RECV_STATUS_NO = 0;
  MAIL_RECV_STATUS_YES = 1;
}

message MailUserData {
}

message MailExcelHistory {
  repeated uint32 history = 1;
}

message MailSrc {
  uint32 uin = 2;
  bytes name = 3;
  Next.OssReason oss_reason = 4;
  bool has_jump = 6;
}

message MailInfo {
  int64 mail_gid = 1;
  Next.MailSrc src = 2;
  bytes title = 3;
  bytes contents = 4;
  uint32 add_time = 6;
  uint32 expire_time = 7;
  Next.MailRecvStatusType recv_status = 8;
  Next.MailStatusType mail_status = 9;
  uint32 mail_conf_id = 10;
  Next.MailParamList params = 11;
  Next.GoodsReward reward = 12;
  bool use_svr_data = 13;
  uint32 plat_type = 14;
  uint32 cond_type = 15;
  uint32 reward_id = 16;
  uint32 guard_id = 17;
  uint64 mail_serial_num = 18;
}

message MailInfoList {
  uint32 uin = 1;
  repeated Next.MailInfo mails = 2;
  repeated bytes byte_mails = 3;
}

message IdipInfo {
  int32 source = 1;
  bytes serial = 2;
}

message MailNotify {
  Next.RetInfo ret_info = 1;
  Next.MailInfo mail_info_no_use = 2;
  Next.MailInfoList mail_list = 3;
}

message AreaMailInfo {
  uint32 uid = 1;
  uint32 send_time = 3;
  Next.MailRecvBrief mail_recv_brief = 4;
}
