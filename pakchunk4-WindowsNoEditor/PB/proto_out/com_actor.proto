enum PendantItemStatus {
  PIS_NONE = 0;
  PIS_DISABLE = 1;
  PIS_ENABLE = 2;
  PIS_TRANSPARENT = 3;
}

enum SetNpcPosType {
  SNPT_NONE = 0;
  SNPT_ITEM_DROP = 1;
  SNPT_AI_MOVE = 2;
  SNPT_AI_PET_FOLLOW = 3;
  SNPT_AI_TELEPORT = 4;
}

enum ControllableNpcOpType {
  CNOT_NONE = 0;
  CNOT_CREATE = 1;
  CNOT_DELETE = 2;
  CNOT_CHANGE_DIR = 3;
  CNOT_ACTION = 4;
}

enum RemoveAuraReason {
  DAR_NONE = 0;
  DAR_TIMEOUT = 1;
  DAR_MUTEX = 2;
  DAR_AREA_TAG = 3;
  DAR_WEATHER = 4;
  DAR_OVERSIZE = 5;
}

enum ShareAuraReason {
  SAR_NONE = 0;
  SAR_SEAT = 1;
}

message LogicStatusOpInfo {
  uint32 op_type = 1;
  uint32 status = 2;
}

message SetNpcPosItem {
  uint64 npc_id = 1;
  Next.Point pt = 2;
  uint64 npc_logic_id = 3;
  Next.SetNpcPosType op_type = 4;
}

message AreaTrigInfo {
  uint32 area_trig_id = 1;
  int32 option_stage = 2;
  bool is_done = 3;
}

message NpcTraceInfo {
  uint32 content_id = 1;
  uint64 npc_obj_id = 2;
  uint64 npc_logic_id = 3;
  Next.Point pt = 4;
  int32 pet_base_id = 5;
  int32 npc_cfg_id = 6;
}

message AffectNavDynamicNpcData {
  uint32 npc_point_id = 1;
  int32 result_id = 2;
}

message AddAuraResult {
  bool has_added = 1;
  int64 gen_aura_id = 2;
  int32 reason = 3;
  int32 fail_param = 4;
}

message CreateAuraInfo {
  int32 conf_id = 10;
  Next.Point pt = 11;
  uint64 create_actor_id = 12;
}

message RemoveAuraInfo {
  int64 aura_id = 1;
  Next.RemoveAuraReason reason = 2;
  repeated int64 mutex_aura_id = 3;
  Next.CreateAuraInfo create_info = 10;
}

message SelfActorAdjustData {
  uint64 platform_actor_id = 1;
}
