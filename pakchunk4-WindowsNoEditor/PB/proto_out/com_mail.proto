package Next;

import "com_goods.proto";

message MailCustomContent {
  uint32 excel_id = 1;
  repeated int32 reward_list = 2;
  Next.GoodsReward rewards = 3;
}

message TlogPlayerInfo {
  bytes game_svr_id = 1;
  bytes event_time = 2;
  bytes app_id = 3;
  uint32 plat_id = 4;
  uint32 world_id = 5;
  bytes openid = 6;
  uint32 uin = 7;
  bytes role_name = 8;
  uint32 role_level = 9;
}

message MailParamInfo {
  uint32 key = 1;
  bytes value = 2;
}

message MailParamList {
  repeated Next.MailParamInfo content_param_list = 1;
  repeated Next.MailParamInfo title_param_list = 2;
}

message MailRecvBrief {
  int64 mail_gid = 1;
  uint32 mail_conf_id = 2;
  Next.MailParamList params = 3;
  Next.GoodsReward reward = 4;
  bytes title = 6;
  bytes contents = 7;
  uint32 reward_id = 8;
  uint32 guard_id = 9;
  uint32 add_time = 10;
  int64 expire_at = 11;
  uint64 mail_serial_num = 12;
}

message MailFailInfo {
  Next.MailRecvBrief brief_info = 1;
  int32 fail_num = 2;
}
