message AutoParam {
  string key = 1;
  bool require = 2;
  int32 type = 3;
  string param_name = 4;
  string param_desc = 5;
  repeated string param_str = 7;
}

message CommGmCmd {
  string cmd_id = 1;
  string cmd_name = 2;
  string cmd_desc = 3;
  repeated Next.AutoParam params = 4;
  string cmd_belong = 5;
}

message GmNpcInfo {
  bytes obj_id = 1;
  uint32 npc_cfg_id = 2;
  bytes npc_detail_type = 3;
  bytes name = 4;
  uint32 content_cfg_id = 5;
  Next.Position pos = 6;
  bool view = 7;
  bool advance_npc = 8;
  uint32 weight = 9;
  uint32 distance = 10;
}

message GmNpcBlackboard {
  uint64 actor_id = 1;
  bytes blackboard_str = 2;
}

message DotsServerAIInfo {
  uint64 actor_id = 1;
  Next.Point pt = 2;
  int32 lod_type = 3;
  uint64 owner_id = 4;
}

message DotsServerAIOwnerPlayerInfo {
  uint64 player_id = 1;
  Next.Point pt = 2;
}

message DotsServerAIVisualizationInfo {
  repeated Next.DotsServerAIInfo ai_list = 1;
  repeated Next.DotsServerAIOwnerPlayerInfo player_list = 2;
  int32 total_ai_count = 3;
  int32 total_rsp_num = 4;
  int32 cur_rsp_index = 5;
}

message NavFindPathInfo {
  repeated Next.Position pos = 1;
}

message DebugDrawColor {
  uint32 R = 1;
  uint32 G = 2;
  uint32 B = 3;
  uint32 A = 4;
}

message NavMeshDebugDraw {
  message NavMeshBoundary {
    Next.Position begin_pos = 1;
    Next.Position end_pos = 2;
  }
  message NavMeshPoly {
    int32 flag = 1;
    Next.DebugDrawColor color = 2;
    repeated Next.Position verts = 3;
  }
  message NavMeshTile {
    repeated Next.NavMeshDebugDraw.NavMeshPoly polys = 1;
    repeated Next.NavMeshDebugDraw.NavMeshBoundary inner_boundaries = 2;
    Next.DebugDrawColor inner_color = 3;
    repeated Next.NavMeshDebugDraw.NavMeshBoundary outer_boundaries = 4;
    Next.DebugDrawColor outer_color = 5;
  }
  repeated Next.NavMeshDebugDraw.NavMeshTile tiles = 1;
}

message HomePetGmStealInfo {
  uint32 pet_gid = 1;
  bytes name = 2;
  int32 goods_num = 3;
  int32 goods_total_num = 4;
}
