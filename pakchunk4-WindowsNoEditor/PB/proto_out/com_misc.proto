}

message InnerPet {
  int32 petbase_id = 1;
  uint32 mutation_type = 2;
  uint32 pet_lv = 3;
  uint32 hp_talent = 4;
  uint32 attack_talent = 5;
  uint32 special_attack_talent = 6;
  uint32 defense_talent = 7;
  uint32 special_defense_talent = 8;
  uint32 speed_talent = 9;
  uint32 gender = 10;
  uint32 nature = 11;
  Next.GlassInfo glass_info = 13;
}

message FlowerCatchInfo {
  uint32 pet_gid = 1;
}

message InnerBattleTask {
  uint32 task_id = 1;
  uint32 task_state = 2;
  Next.FlowerCatchInfo catch_info = 3;
}

message SpecFlowerSeed {
  uint32 spec_flower_seed_id = 1;
  uint32 content_cfg_id = 2;
  int32 seed_star = 3;
  Next.InnerPet inner_pet = 4;
  uint32 catch_vitem_quantity = 5;
  uint32 activity_id = 6;
  uint32 end_timestamp = 7;
  repeated Next.InnerBattleTask battle_tasks = 8;
  uint32 bind_pet_gid = 9;
  uint32 bind_petbase_id = 10;
  uint32 bind_evolution_id = 11;
  uint32 medal_id = 12;
}

message Transform {
  Next.Position pos = 1;
  Next.Position rot = 2;
  Next.Position scale = 3;
}

message EnvInfoLabelTag {
  uint32 Tag = 1;
  uint32 Value = 2;
}

message EnvLabelTags {
  int32 index_z = 1;
  repeated Next.EnvInfoLabelTag cell_tags = 2;
}

message SubmitPetData {
