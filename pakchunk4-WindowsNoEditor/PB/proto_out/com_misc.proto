message CreatureAttrs_SimpleAttr32 {
  int32 val = 2;
}

message CreatureAttrs_SimpleAttr64 {
  int64 val = 2;
}

message CreatureAttrs_ComplexAttr32 {
  int32 val = 2;
  int32 base = 3;
  int32 total_addi_amend = 4;
  repeated int32 addi_amends = 5;
  int32 total_mul_amend = 6;
  repeated int32 mul_amends = 7;
}

message CreatureAttrs_ComplexAttr64 {
  int32 type = 1;
  int64 val = 2;
  int64 base = 3;
  int64 total_addi_amend = 4;
  repeated int64 addi_amends = 5;
  int32 total_mul_amend = 6;
  repeated int32 mul_amends = 7;
}

message SystemExecuteTime {
  message TimeCost {
    uint64 start_time = 1;
    uint64 cost_time = 2;
  }
  string key = 1;
