}

message GlobalConfInfo {
  int32 num = 1;
  repeated int32 num_list = 2;
  string str = 3;
  string key = 4;
  int32 id = 5;
}

message GlobalConfList {
  repeated Next.GlobalConfInfo global_list = 1;
}

message RobotInfo {
  uint32 id = 1;
  bytes openid = 2;
  uint32 dead_time = 3;
  uint32 patrol_type = 4;
  uint32 bron_area_id = 5;
  uint32 target_area_id = 6;
  uint32 patrol_interval_time = 7;
}

message AIBattlePet {
  uint32 gid = 1;
  uint32 conf_id = 2;
  uint32 blood_id = 3;
  repeated uint32 equip_skills = 4;
}

message ClientRemoteStorageData {
  string key = 1;
  bytes value = 2;
  int64 expire_time = 3;
  int64 create_time = 4;
}

message PlayerClientRSInfo {
  repeated Next.ClientRemoteStorageData client_rs_data_list = 1;
}

message BytesData {
  uint64 id = 1;
  uint64 id2 = 2;
  uint64 id3 = 3;
  uint64 id4 = 4;
  uint64 id5 = 5;
  repeated uint64 data_index = 6;
  bytes data = 7;
  bytes data2 = 8;
  Next.DataLeaseInfo lease_info = 9;
}

message BytesColumnData {
  message ColumnData {
    string column_name = 1;
    bytes data = 2;
  }
  uint64 id = 1;
  repeated Next.BytesColumnData.ColumnData column_data = 2;
  Next.DataLeaseInfo lease_info = 3;
  bool require_insert = 4;
}

message BytesListData {
  uint64 id = 1;
  uint64 id2 = 2;
  uint64 id3 = 3;
  uint64 id4 = 4;
  uint64 id5 = 5;
  int64 index = 6;
  bytes data = 7;
  bytes data2 = 8;
  Next.DataLeaseInfo lease_info = 9;
}

message DataLeaseInfo {
  enum ValidationPolicy {
    VALIDATION_POLICY_NONE = 0;
    VALIDATION_POLICY_LOOSE = 1;
    VALIDATION_POLICY_STRICT = 2;
  }
  message Lease {
    uint64 lease_instance_id = 1;
    uint64 lease_version = 2;
    uint64 lease_last_sync_time = 3;
  }
  Next.DataLeaseInfo.ValidationPolicy policy = 1;
  Next.DataLeaseInfo.Lease lease_token = 2;
  Next.DataLeaseInfo.Lease lease_data = 3;
}

message DotsComponentData {
  repeated Next.BytesData component_datas = 1;
}

message SceneSeasonInfo {
  int32 season_id = 1;
  int32 season_adv_shining_extra_weight = 2;
  int32 season_adv_catch_prob_add = 3;
}

message KeyValueItem {
  string key = 1;
  string value = 2;
}

message KeyValueList {
  repeated Next.KeyValueItem kvlist = 1;
}

message VItem {
  dataconfig.GoodsType goods_type = 1;
  uint32 goods_num = 2;
}
