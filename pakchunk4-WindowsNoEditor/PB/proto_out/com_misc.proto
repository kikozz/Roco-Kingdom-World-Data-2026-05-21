}

message AutoIncrementInfo {
  dataconfig.AutoIncrementType type = 1;
  uint32 key1 = 2;
  uint32 key2 = 3;
  uint64 step = 7;
  uint64 seq = 8;
  bool is_minus = 9;
}

message CommonTextInfoArgs {
  uint32 type = 1;
  string param = 2;
}

message CommonTextInfo {
  string text_id = 1;
  repeated Next.CommonTextInfoArgs args = 2;
}

message FuncBlockingConfItem {
  int32 func_id = 1;
  int32 is_open = 2;
  int32 is_audit = 3;
  int32 version_rule = 4;
  string open_client_version_ios = 5;
  string open_client_version_android = 6;
  string open_client_version_pc = 7;
  int32 channel_conf_id = 8;
  string open_client_version_harmony_os = 9;
  string open_client_version_harmony_pc = 10;
  repeated int32 login_plat_limit = 11;
}

message FuncBlockingChannelConfItem {
  int32 channel_conf_id = 1;
  repeated int32 display_platform = 2;
  repeated string pkg_channel_hidden_list = 3;
  repeated string pkg_channel_show_list = 4;
}

message FuncBlockingConfs {
  int32 func_type = 1;
  repeated Next.FuncBlockingConfItem func_confs = 2;
  repeated Next.FuncBlockingChannelConfItem channel_confs = 3;
}

message ObjSyncInfo {
  uint64 id = 1;
  int32 sync_id = 2;
  bytes data = 3;
}

message GeneralColumnFieldInfo {
  string column_name = 1;
  Next.GeneralColumnType column_type = 2;
}

message GeneralColumnFieldsInfo {
  repeated Next.GeneralColumnFieldInfo field_info_list = 1;
}

message GeneralColumnField {
  bytes bytes_val = 1;
  int32 int32_val = 2;
  int64 int64_val = 3;
  string str_val = 4;
  uint64 uint64_val = 5;
}

message GeneralColumnRecord {
  uint64 id = 1;
  uint64 id2 = 2;
  uint64 id3 = 3;
  uint64 id4 = 4;
  uint64 id5 = 5;
  repeated Next.GeneralColumnField field_list = 6;
  Next.DataLeaseInfo lease_info = 7;
  int32 version = 8;
}

message GeneralColumnRecordList {
  repeated Next.GeneralColumnRecord record_list = 1;
}

message SubscriptionBucketLease {
