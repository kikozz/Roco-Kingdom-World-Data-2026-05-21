package Next;

import "com_goods.proto";
import "com_task.proto";

enum RecoverMsgType {
  RECOVER_MSG_TYPE_INTIAL = 0;
  RECOVER_MSG_TYPE_TASK = 1;
}

message RpcVoidReq {
}

message RpcVoidRsp {
}

message RetInfo {
  int32 ret_code = 1;
  string ret_msg = 2;
  Next.GoodsReward goods_reward = 3;
  Next.GoodsChange goods_change_info = 4;
}

message BanInfo {
  uint32 ban_time = 1;
  string ban_reason = 2;
  uint32 uin = 3;
  uint32 ban_type = 4;
  uint32 func_id = 5;
}

message RpcRetryReqInfo {
  uint64 req_id = 1;
  string service_name = 2;
  int32 method_id = 3;
  bytes req_data = 4;
}

message RpcRetryReqProcessInfo {
  uint64 req_id = 1;
  bool processed = 2;
}

message RpcRetryInfo {
  uint64 latest_req_id = 1;
  uint64 oldest_unresponded_req_id = 2;
  repeated Next.RpcRetryReqInfo unresponded_req_infos = 3;
  uint64 latest_processed_req_id = 6;
  repeated Next.RpcRetryReqProcessInfo req_process_infos = 7;
  uint64 oldest_processing_req_id = 8;
}

message GetRpcRetryDataReq {
  uint64 latest_req_id = 1;
}

message GetRpcRetryDataRsp {
  repeated Next.RpcRetryReqInfo rpc_retry_req_info = 1;
}

message SyncRpcRetryDataReq {
  repeated Next.RpcRetryReqInfo rpc_retry_req_info = 1;
  uint64 latest_req_id = 2;
  uint64 oldest_processing_req_id = 3;
  uint64 latest_processed_req_id = 4;
}

message SyncRpcRetryDataRsp {
  uint64 oldest_processing_req_id = 1;
}

message TestRpcRetryDataReq {
  string req_data = 1;
}

message TestRpcRetryDataRsp {
  string rsp_data = 1;
}

message RecoverMsgTaskInfo {
  Next.SceneTaskActionList action_list = 1;
  repeated Next.DBTaskTargetData task_target = 2;
}

message RecoverMsgAckInfo {
  Next.RecoverMsgType type = 1;
  uint64 ack = 2;
  repeated Next.RecoverMsgInfo recover_msg_list = 4;
  uint64 finish_gid = 5;
}

message RecoverMsgAckList {
  repeated Next.RecoverMsgAckInfo ack_list = 1;
  uint64 last_update_time = 2;
  uint64 last_sync_time = 3;
  Next.TaskProgressData task_progress_data = 4;
}

message DBTaskTargetData {
  int32 key = 1;
  int32 data = 2;
}

message RecoverMsgTestInfo {
}

message RecoverMsgIdipInfo {
  uint32 action_type = 1;
  uint32 param1 = 2;
  uint32 param2 = 3;
}

message RecoverMsgInfo {
  uint64 key1 = 1;
  uint64 key2 = 2;
  uint64 seq = 3;
  uint32 finish = 4;
  uint32 type = 5;
  uint32 is_scene_action = 6;
  uint32 try_times = 7;
  uint64 key3 = 8;
  Next.RecoverMsgTaskInfo task_info = 11;
  Next.RecoverMsgTestInfo test_info = 10;
  Next.RecoverMsgIdipInfo idip_info = 12;
}

message RecoverMsgData {
  Next.RecoverMsgType type = 1;
  uint64 gid = 2;
  uint64 ack = 3;
  repeated Next.RecoverMsgInfo recover_msg_list = 4;
  uint64 last_update_time = 5;
  repeated Next.RecoverMsgInfo bak_recover_msg_list = 6;
  uint32 finish_gid_old = 7;
  uint64 last_sync_time = 8;
  uint64 finish_gid = 9;
  uint64 last_stat_sync_time = 11;
  uint64 last_enter_scene_time = 12;
  uint64 last_scenesvr_id = 13;
  uint64 last_ack_time = 14;
  bool have_next_seq_data = 15;
}

message TaskTrackRecoverInfo {
  uint32 task_id = 1;
  repeated Next.TaskContentItem content_items = 2;
}

message TaskTrackRecoverList {
  repeated Next.TaskTrackRecoverInfo items = 2;
}

message RecoverMsgList {
  repeated Next.RecoverMsgData recover_data_list = 4;
  uint64 last_update_time = 5;
  Next.SceneTaskActionNpcDelayList delay_npc_actions = 6;
  Next.TaskScenesvrStateData scene_state_data = 7;
  Next.TaskProgressData task_progress_data = 8;
  uint64 finish_idip_seq = 10;
  uint32 last_tick_time = 11;
  uint32 need_recover_all = 12;
  uint32 need_recover_all_set_time = 13;
  Next.TaskTrackRecoverList track_recover_list = 14;
  Next.SceneTaskActionNpcDelayList home_delay_npc_actions = 15;
}

message ZoneSceneSysFuncBannedNotify {
  Next.BanInfo ban_info = 1;
}
