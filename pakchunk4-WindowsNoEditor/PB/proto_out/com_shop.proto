package Next;

import "xls_enum.proto";

message GoodsPrice {
  uint32 num = 2;
  dataconfig.GoodsType goods_type = 3;
  uint32 goods_id = 4;
}

message SubGoodsData {
  uint32 goods_id = 1;
  Next.GoodsPrice origin_price = 2;
  Next.GoodsPrice real_price = 3;
  bool is_gift = 4;
}

message GoodsData {
  uint32 goods_id = 2;
  uint32 buy_num = 3;
  int64 next_refresh_time = 5;
  Next.GoodsPrice origin_price = 8;
  Next.GoodsPrice real_price = 9;
  int32 limit_buy_num = 10;
  int64 disable_time = 12;
  repeated Next.SubGoodsData sub_goods = 13;
}

message ShopData_ConsumeInfo_RewardTakenInfo {
  uint32 level = 1;
  bool is_reward_taken = 2;
}

message ShopData_ConsumeInfo {
  uint32 total_consume_num = 2;
  repeated Next.ShopData_ConsumeInfo_RewardTakenInfo reward_taken_info = 3;
}

message ShopData {
  uint32 id = 1;
  Next.ShopData_ConsumeInfo consume_info = 2;
  repeated Next.GoodsData goods_data = 5;
  repeated int32 random_shop_shown_indexes = 6;
  int32 max_refresh_count = 7;
  int32 refresh_count = 8;
  uint64 version = 9;
  int64 disable_time = 10;
}

message ShopBuyItemInfo {
  int32 goods_item_num = 2;
  int32 goods_id = 3;
}

message DBShopGoods {
  uint32 id = 1;
  int32 buy_num = 2;
  int64 last_refresh_time = 3;
  int64 next_refresh_time = 4;
}

message DBShopConsumeReward {
  int32 level = 1;
  bool is_taken = 2;
}

message DBShopConsumeInfo {
  dataconfig.GoodsType goods_type = 1;
  uint32 goods_id = 2;
  uint32 total_consume_num = 3;
  repeated Next.DBShopConsumeReward rewards = 4;
}

message DBShopOne {
  uint32 id = 1;
  uint64 version = 2;
  repeated Next.DBShopGoods goods_list = 3;
  repeated int32 random_shop_shown_indexes = 5;
  int64 last_refresh_time = 6;
  int32 max_refresh_count = 7;
  int32 refresh_count = 8;
  Next.DBShopConsumeInfo acc_consume = 9;
  repeated Next.DBGoodsGroupData goods_group = 10;
}

message DBGoodsGroupData {
  uint32 group_id = 1;
  int32 buy_num = 2;
  int64 last_refresh_time = 3;
}

message DBShopSharedData {
  repeated Next.DBGoodsGroupData goods_group = 1;
}

message MonthCardData {
  uint32 id = 1;
  uint32 left_days = 2;
  uint32 buy_time = 3;
  uint32 sign_days = 4;
  uint32 last_sign_time = 5;
  uint32 continue_time = 6;
  uint32 reset_time = 7;
  uint32 daily_rewards = 8;
}

message DBShop {
  repeated Next.DBShopOne shops = 1;
  Next.MonthCardData month_card = 2;
  int64 seq = 3;
  Next.DBShopSharedData shared_data = 4;
}
