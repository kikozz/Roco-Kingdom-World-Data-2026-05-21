package Next;

import "com_base_types.proto";

enum DungeonState {
  DS_UNDISCOVERED = 0;
  DS_DISCOVERED = 1;
  DS_DONE = 2;
}

message DungeonInfo {
  uint32 dungeon_id = 1;
  uint32 last_enter_time = 2;
  uint32 dungeon_finish_count = 3;
  uint32 total_finish_count = 4;
  uint64 dungeon_inst_id = 5;
  uint64 scene_inst_id = 6;
  uint64 cell_id = 7;
  Next.Point pt = 8;
  bool destroy = 9;
  bool last_quit_halfway = 10;
  uint32 from_scene_cfg_id = 11;
  Next.Point from_pos = 12;
  bool current_finish = 13;
  uint32 last_leave_time = 14;
  repeated uint32 open_stage_ids = 15;
  bool ack_bst_finish = 16;
  repeated uint32 finish_stage_ids = 17;
  bool need_reset_stage = 18;
  int64 first_enter_time = 19;
  int64 first_finish_time = 20;
  bool collect_finish = 21;
  repeated uint32 finished_stage_ids = 22;
}

message PlayerDungeonInfo {
  repeated Next.DungeonInfo dungeon_infos = 1;
  bool delay_reset_check = 2;
  uint64 back_to_bigworld_scene_id = 3;
  Next.Point back_to_bigworld_pt = 4;
  int32 will_to_dungeon_cfg_id = 5;
}

message DungeonStateInfo {
  uint32 dungeon_id = 1;
  uint32 dungeon_state = 2;
  uint32 done_count = 3;
  bool entered = 4;
  int32 from_scene_cfg_id = 5;
  Next.Point from_pt = 6;
  bool need_bst_finish = 7;
  repeated uint32 finish_stage_ids = 8;
  repeated uint32 finished_stage_ids = 9;
}
